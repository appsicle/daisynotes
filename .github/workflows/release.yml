# Releases, two lanes:
#
# 1. Every push to main → an automatic PRE-release tagged
#    v{version}-build.{run} with DaisyNotes.dmg/zip attached. Pre-releases never
#    become `releases/latest`, so the landing page's download button keeps
#    serving the notarized stable build.
#
# 2. A v* tag → a stable release. scripts/release.sh (run locally, where
#    the Developer ID certificate and notary credentials live) creates the
#    release with notarized assets BEFORE pushing the tag; CI then sees the
#    release already exists and leaves it alone. If a tag is pushed bare,
#    CI creates the release itself with ad-hoc-signed assets as a fallback.
#
# Marketing-only pushes are skipped here (they deploy via marketing.yml). The
# paths-ignore below applies to branch pushes only — GitHub does not evaluate
# path filters for tag pushes, so v* tags always build.

name: release
on:
  push:
    branches: ["main"]
    paths-ignore:
      - "marketing/**"
      - ".github/workflows/marketing.yml"
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14 # Apple silicon
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: DMG styling deps
        run: pipx install dmgbuild

      - name: Package
        run: scripts/package.sh

      - name: Publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "release $TAG already exists (created locally, notarized) — not touching its assets"
              exit 0
            fi
            gh release create "$TAG" dist/DaisyNotes.dmg dist/DaisyNotes.zip \
              --title "Daisy Notes ${TAG#v}" \
              --generate-notes
          else
            TAG="v${VERSION}-build.${GITHUB_RUN_NUMBER}"
            SHORT_SHA=$(git rev-parse --short HEAD)
            gh release create "$TAG" dist/DaisyNotes.dmg dist/DaisyNotes.zip \
              --prerelease \
              --target "$GITHUB_SHA" \
              --title "Daisy Notes ${VERSION} (build ${GITHUB_RUN_NUMBER}, ${SHORT_SHA})" \
              --notes "Automatic build of \`${SHORT_SHA}\` from \`main\`. Ad-hoc signed — for testing; grab the latest stable release for the notarized app."
          fi
